# Curated short-doc DocVQA-family training pool.
# `questions` = the prepared prompt set (run prepare_data.py to materialize).
# `n_sample`  = per-source weight: how many questions sample_pool.py draws from
#   this source into the balanced pool (capped at availability). Tune per source
#   to control the mix; equal values => balanced. tier = curriculum difficulty.
# Categories used are 5 of DocVQA-2026's 8 (business_report, infographics, maps,
# science_poster, slide); comics/engineering_drawing/science_paper have no
# suitable short-doc source. The agent loop's per-category prompting applies.
datasets:
  # Phase 1 — native single-page (fast rollouts)
  - name: docvqa-sp
    questions: data/docvqa-sp/validation/questions.json
    category: business_report
    tier: easy
    n_sample: 1500
  - name: infographicvqa
    questions: data/infographicvqa/validation/questions.json
    category: infographics
    tier: hard
    n_sample: 1500
  - name: chartqa
    questions: data/chartqa/train/questions.json
    category: science_poster
    tier: easy
    n_sample: 1500
  - name: mapqa
    questions: data/mapqa/train/questions.json
    category: maps
    tier: easy
    n_sample: 1500   # capped from ~483k so it doesn't dominate
  # Phase 2 — short multi-page + numeric (prepare these, then they activate)
  - name: mp-docvqa
    questions: data/mp-docvqa/val/questions.json
    category: business_report
    tier: mid
    n_sample: 1500
  - name: tatdqa
    questions: data/tatdqa/dev/questions.json
    category: business_report
    tier: mid
    n_sample: 1500
  # DUDE excluded for now (adapter_dude remains in prepare_data.py; re-add an
  # entry here to bring it back). Heavy multi-GB downloads + replicated loader
  # join made it the highest-risk adapter; revisit after the rest is validated.
  - name: slidevqa
    questions: data/slidevqa/train/questions.json
    category: slide
    tier: mid
    n_sample: 1500
  # MMLongBench-Doc: long multi-page docs. Included (helped DocVQA in SFT
  # experiments) despite long rollouts -> EXPENSIVE to collect. Only ~964 Qs
  # available; lower n_sample for cheaper teacher collection. category=mixed
  # (rows carry their own doc_type, not one of DocVQA-2026's 8).
  - name: mmlongbench-doc
    questions: data/mmlongbench-doc/train/questions.json
    category: mixed
    tier: hard
    n_sample: 1000
